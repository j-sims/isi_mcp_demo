version: "3.8"
services:
  nginx:
    image: nginx:alpine
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - isi_mcp
    networks:
      - isi_mcp_net
    restart: unless-stopped

  isi_mcp:
    build: isi_mcp_demo/isi_mcp/
    env_file:
      - config/isi_mcp.env
    environment:
      - DEBUG=${DEBUG:-}
      - ENABLE_ALL_TOOLS=${ENABLE_ALL_TOOLS:-}
      - IAC_MODE=${IAC_MODE:-}
      - VAULT_PASSWORD=${VAULT_PASSWORD:-}
    volumes:
      - ./VERSION:/app/VERSION:ro
      - ./vault:/app/vault
      - ./playbooks:/app/playbooks
      - ./isi_mcp_demo/isi_mcp/config:/app/config
    networks:
      - isi_mcp_net
    restart: unless-stopped

  keycloak-db:
    image: postgres:16-alpine
    profiles: [auth]
    env_file:
      - config/keycloak-db.env
    environment:
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-keycloak}
    volumes:
      - keycloak-db-data:/var/lib/postgresql/data
    networks:
      - auth_net
    restart: unless-stopped

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    profiles: [auth]
    command: start --import-realm --hostname-strict=false --proxy-headers=xforwarded --http-enabled=true
    env_file:
      - config/keycloak.env
    environment:
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-keycloak}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    depends_on:
      - keycloak-db
    networks:
      - isi_mcp_net
      - auth_net
    restart: unless-stopped

networks:
  isi_mcp_net:
    driver: bridge
  auth_net:
    driver: bridge

volumes:
  keycloak-db-data:
